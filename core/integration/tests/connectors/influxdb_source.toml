type = "source"
key = "influxdb"
enabled = true
version = 0
name = "InfluxDB source (test)"
path = "target/release/libiggy_connector_influxdb_source"
verbose = false

[[streams]]
stream = "connector_stream"
topic = "connector_topic"
schema = "json"
batch_length = 100

[plugin_config]
url = "http://localhost:8086"
org = "test-org"
token = "test-token"
query = '''
from(bucket: "test-bucket")
  |> range(start: 2023-01-01T00:00:00Z)
  |> filter(fn: (r) => r._time > time(v: "$cursor"))
  |> sort(columns: ["_time"])
  |> limit(n: $limit)
'''
poll_interval = "200ms"
batch_size = 500
cursor_field = "_time"
initial_offset = "2023-01-01T00:00:00Z"
include_metadata = true
payload_format = "json"
max_retries = 3
retry_delay = "200ms"
timeout = "5s"
max_open_retries = 3
open_retry_max_delay = "5s"
circuit_breaker_threshold = 10
circuit_breaker_cool_down = "5s"
