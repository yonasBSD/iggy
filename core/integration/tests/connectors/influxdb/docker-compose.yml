# docker-compose for InfluxDB connector integration tests.
#
# File location:
#   core/integration/tests/connectors/influxdb/docker-compose.yml
#
# Used as a fallback when running tests without a Docker daemon that supports
# testcontainers auto-launch (e.g. some CI environments). Start manually with:
#   docker compose -f core/integration/tests/connectors/influxdb/docker-compose.yml up -d
# then run:
#   INFLUXDB_URL=http://localhost:8086 cargo test -p iggy-integration-tests influxdb

version: "3.8"

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: iggy-test-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:         setup
      DOCKER_INFLUXDB_INIT_USERNAME:     iggy-admin
      DOCKER_INFLUXDB_INIT_PASSWORD:     iggy-password
      DOCKER_INFLUXDB_INIT_ORG:          iggy-test-org
      DOCKER_INFLUXDB_INIT_BUCKET:       iggy-test-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:  iggy-super-secret-test-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - iggy-influxdb-data:/var/lib/influxdb2

  # InfluxDB instance for the SOURCE connector tests (separate bucket/org)
  influxdb-source:
    image: influxdb:2.7-alpine
    container_name: iggy-test-influxdb-source
    ports:
      - "8087:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:         setup
      DOCKER_INFLUXDB_INIT_USERNAME:     iggy-admin
      DOCKER_INFLUXDB_INIT_PASSWORD:     iggy-password
      DOCKER_INFLUXDB_INIT_ORG:          iggy-src-org
      DOCKER_INFLUXDB_INIT_BUCKET:       iggy-src-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:  iggy-src-secret-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - iggy-influxdb-source-data:/var/lib/influxdb2

  # InfluxDB 3.x instance for sink V3 tests (native /api/v3/* endpoints)
  influxdb3-sink:
    image: influxdb:3-core
    container_name: iggy-test-influxdb3-sink
    ports:
      - "8188:8181"
    command: ["influxdb3", "serve", "--node-id", "node-sink", "--object-store", "memory", "--without-auth"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8181/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # InfluxDB 3.x instance for source V3 tests
  influxdb3-source:
    image: influxdb:3-core
    container_name: iggy-test-influxdb3-source
    ports:
      - "8189:8181"
    command: ["influxdb3", "serve", "--node-id", "node-source", "--object-store", "memory", "--without-auth"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8181/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  iggy-influxdb-data:
  iggy-influxdb-source-data:
