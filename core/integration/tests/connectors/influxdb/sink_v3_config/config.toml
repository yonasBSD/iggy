# Connector config for InfluxDB V3 sink integration tests.
# Contains only V3 fields — no V2-only fields (org, bucket).
# All placeholder values are overridden at test time via env vars.

type = "sink"
key = "influxdb"
enabled = true
version = 0
name = "InfluxDB V3 sink"
path = "../../target/debug/libiggy_connector_influxdb_sink"
verbose = false

[[streams]]
stream = "test_stream"
topics = ["test_topic"]
schema = "json"
batch_length = 100
poll_interval = "5ms"
consumer_group = "influxdb3_sink_cg"

[plugin_config]
version = "v3"
url = "http://localhost:8181"
db = "iggy-test-db"
token = "placeholder"
measurement = "iggy_messages"
precision = "ns"
batch_size = 100
payload_format = "json"
max_retries = 3
retry_delay = "200ms"
timeout = "10s"
max_open_retries = 5
open_retry_max_delay = "10s"
circuit_breaker_threshold = 10
circuit_breaker_cool_down = "5s"
