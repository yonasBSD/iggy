# Harness config for InfluxDB V3 source connector integration tests.
# Uses the native /api/v3/query_sql endpoint with Bearer auth and JSONL response.

[connectors]
config_type = "local"
config_dir = "tests/connectors/influxdb/source_v3_config"
[plugin_config]
version = "v3"
precision = "ns"
