type = "sink"
key = "influxdb"
enabled = true
version = 0
name = "InfluxDB sink (test)"
path = "target/release/libiggy_connector_influxdb_sink"
verbose = false

[[streams]]
stream = "connector_stream"
topics = ["connector_topic"]
schema = "json"
batch_length = 10
poll_interval = "100ms"
consumer_group = "influxdb_sink_test"

[plugin_config]
url = "http://localhost:8086"
org = "test-org"
bucket = "test-bucket"
token = "test-token"
measurement = "iggy_messages"
precision = "ms"
batch_size = 100
include_metadata = true
include_checksum = false
include_origin_timestamp = false
include_stream_tag = true
include_topic_tag = true
include_partition_tag = true
payload_format = "json"
max_retries = 3
retry_delay = "200ms"
timeout = "5s"
max_open_retries = 3
open_retry_max_delay = "5s"
circuit_breaker_threshold = 10
circuit_breaker_cool_down = "5s"
