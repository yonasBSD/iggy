<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self' https://benchmarks.iggy.apache.org;
    connect-src 'self' https://benchmarks.iggy.apache.org;
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
    script-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;"
        />
        <base href="/" />
        <title>Apache Iggy Benchmarks Dashboard</title>
        <link data-trunk rel="copy-dir" href="assets" />
        <link data-trunk rel="rust" data-wasm-opt="z" />
        <link data-trunk rel="css" href="assets/style.css" />
        <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-0972B5SEN0"
        ></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());

            gtag("config", "G-0972B5SEN0");
        </script>
    </head>

    <body>
        <div id="app">
            <div class="boot-splash" role="status" aria-live="polite">
                <div class="boot-splash-body">
                    <img class="boot-splash-mark" src="/assets/iggy-dark.svg" alt="Apache Iggy" />
                    <div class="boot-splash-sub">Benchmarks</div>
                </div>
            </div>
        </div>
        <style>
            .boot-splash {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f5f5f5;
                color: #0b1220;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                z-index: 9999;
            }
            .boot-splash-body {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
                padding: 0 24px;
            }
            @media (prefers-color-scheme: dark) {
                .boot-splash { background: #0b1220; color: #f5f5f5; }
                .boot-splash-mark { content: url("/assets/iggy-light.svg"); }
            }
            .boot-splash-mark {
                width: auto;
                height: 128px;
                max-width: 440px;
                object-fit: contain;
                filter: drop-shadow(0 0 24px rgba(255, 145, 3, 0.35));
                animation: boot-splash-pulse 1800ms ease-in-out infinite;
            }
            .boot-splash-brand {
                margin-top: 4px;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: #ff9103;
            }
            .boot-splash-sub {
                font-size: clamp(28px, 4vw, 44px);
                font-weight: 800;
                letter-spacing: -0.02em;
                line-height: 1;
            }
            @keyframes boot-splash-pulse {
                0%, 100% { opacity: 0.4; transform: scale(0.96); }
                50% { opacity: 1; transform: scale(1); }
            }
        </style>
    </body>
</html>
