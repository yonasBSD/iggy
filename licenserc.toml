baseDir = "."
headerPath = "ASF_LICENSE.txt"
strictCheck = true
useDefaultMapping = true
keywords = ["Licensed to the Apache Software Foundation"]

excludes = [
    "**/target/**",
    "**/node_modules/**",
    "**/.venv/**",
    "**/venv/**",
    "**/dist/**",
    "**/build/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/.gradle/**",
    "**/.svelte-kit/**",
    "**/bin/**",
    "**/obj/**",
    "**/local_data*/**",
    "**/performance_results*/**",
    "**/*.lock",
    "**/*.txt",
    "**/*.tpl",
    "**/LICENSE",
    "LICENSE",
    "NOTICE",
    "DISCLAIMER",
    "**/NOTICE",
    "**/.gitignore",
    "**/.dockerignore",
    "**/.helmignore",
    "**/.prettierignore",
    "**/.editorconfig",
    "**/.bazelignore",
    "**/.bazelrc",
    "**/.clang-format",
    "**/.prettierrc",
    "**/CODEOWNERS",
    "**/gradlew",
    "**/*.md",
    "**/*.hbs",
    "**/*.gotmpl",
    "**/*.sln",
    "**/*.DotSettings",
    "**/.bazelversion",
    "**/.java-version",
    "**/*.png",
    "**/*.jpg",
    "**/*.jpeg",
    "**/*.gif",
    "**/*.pdf",
    "**/*.pem",
    "**/*.pfx",
    "**/*.json",
    "**/*.svg",
    "**/go.mod",
    "**/go.sum",
    "**/.env",
    "**/.gitkeep",
    "**/META-INF/services/**",
    ".github/config/hawkeye.version",
]

[mapping.DOUBLESLASH_STYLE]
extensions = [
    "cs",
    "go",
    "mjs",
    "php",
    "rs",
    "js",
    "ts",
]

[mapping.SCRIPT_STYLE]
filenames = [
    "Dockerfile",
    "Dockerfile.test",
    "Dockerfile.flink2_10-java21",
    "justfile",
]
extensions = [
    "bazel",
    "bzl",
    "feature",
    "http",
    "properties",
    "py",
    "pyi",
    "sh",
    "toml",
    "yaml",
    "yml",
]

[mapping.SLASHSTAR_STYLE]
extensions = [
    "css",
    "fbs",
    "java",
    "kt",
    "kts",
    "proto",
    "c",
    "cc",
    "cpp",
    "h",
    "hpp",
]

[mapping.XML_STYLE]
filenames = [
    "phpunit.xml.dist",
]
extensions = [
    "csproj",
    "html",
    "props",
    "svelte",
    "xml",
]

[git]
ignore = "auto"
attrs = "disable"
