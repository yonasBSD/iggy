name: PR Title
on:
  pull_request:
    branches: [master]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: PR Title
    if: github.event.action != 'edited' || github.event.changes.title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            repo
            deps
          scopes: |
            bdd
            bench
            ci
            cli
            clock
            common
            connector
            connectors
            cpp
            csharp
            deps
            deps-dev
            docs
            example
            go
            helm
            integration
            io_uring
            java
            journal
            js
            mcp
            node
            partitions
            php
            proc
            pr_template
            python
            repo
            rust
            sdk
            security
            server
            server-ng
            shard
            test
            web
            consensus
            cluster
            metadata
            message_bus
            storage
            simulator
            configs
