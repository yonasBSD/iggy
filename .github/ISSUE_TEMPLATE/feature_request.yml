name: Feature Request
description: Suggest a new feature or enhancement
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        > **Tip:** For bigger or exploratory features, consider starting a [Discussion](https://github.com/apache/iggy/discussions) first to gather feedback before filing an issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want and why?
      placeholder: Describe the feature and the problem it solves.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area / component
      description: |
        Which part(s) of the project does this affect? Your selection is auto-labeled on the issue.
      multiple: true
      options:
        - Iggy server
        - Rust SDK
        - Go SDK
        - Java SDK
        - Python SDK
        - "C# SDK"
        - Node.js SDK
        - "C++ SDK"
        - PHP SDK
        - CLI
        - Web UI
        - Connectors
        - MCP server
        - Configuration
        - Wire protocol / API
        - Metadata
        - Clustering / replication
        - Performance
        - Documentation
        - CI / build / tooling
        - Other / not sure
    validations:
      required: false

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: If you have a solution in mind, describe it here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a pull request to implement this feature

  - type: checkboxes
    id: good-first-issue
    attributes:
      label: Good first issue
      description: Ticking this self-tags the issue with the `good first issue` label. Maintainers may remove it during triage.
      options:
        - label: I think this could be a good first issue for a new contributor
