# NOTE: Go builds are fast, so caching is disabled by default.
# The read-cache/save-cache inputs exist for parity with setup-rust-with-cache
# but both default to "false". Enable only if Go build times become a bottleneck.

name: setup-go-with-cache
description: Setup Go toolchain and optional caching (go mod cache + golangci-lint cache)
inputs:
  go-version:
    description: "Go version to use"
    required: false
    default: "1.23.0"
  read-cache:
    description: "Whether to read from cache"
    required: false
    default: "false"
  save-cache:
    description: "Whether to save cache"
    required: false
    default: "false"
  download-deps:
    description: "Whether to download module dependencies"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Go toolchain
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.read-cache == 'true' }}

    - name: Setup additional Go module cache
      if: inputs.read-cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: go-mod-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          go-mod-${{ runner.os }}-${{ runner.arch }}-

    - name: Setup golangci-lint cache
      if: inputs.read-cache == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/golangci-lint
        key: golangci-lint-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          golangci-lint-${{ runner.os }}-

    - name: Download Go module dependencies
      if: inputs.download-deps == 'true'
      run: |
        echo "📦 Downloading Go module dependencies..."

        download_if_exists() {
          local dir="$1"
          if [ -f "${dir}/go.mod" ]; then
            echo "  → ${dir}"
            cd "${dir}" && go mod download && cd - > /dev/null
          fi
        }

        download_if_exists "foreign/go"
        download_if_exists "bdd/go"
        download_if_exists "examples/go"

        echo "✅ Go dependencies downloaded"
      shell: bash

    - name: Verify Go installation
      run: |
        echo "✅ Go setup complete"
        go version
        echo "GOPATH: $(go env GOPATH)"
        echo "GOCACHE: $(go env GOCACHE)"
      shell: bash
