name: rust-pre-merge
description: Rust pre-merge testing and linting github iggy actions

inputs:
  task:
    description: "Task to run (check, check-msrv, fmt, clippy, sort, machete, doctest, verify-publish, test-1, test-2, compat, miri)"
    required: true
  component:
    description: "Component name (for context)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Rust with cache
      uses: ./.github/actions/utils/setup-rust-with-cache
      with:
        # Miri builds against a nightly toolchain with a separate `target/miri`
        # subtree; isolate its cache from the stable `dev` namespace so the
        # two don't evict each other.
        # check-msrv stays on `dev`: only `dev` is ever saved (by
        # coverage-baseline), so a dedicated key would be cold every run. It
        # reads only (pre-merge save-cache=false), so it cannot churn `dev`;
        # the warm `~/.cargo` restore is a free win, and its 1.95 target
        # artifacts rebuild regardless since the rustc hash differs.
        shared-key: ${{ inputs.task == 'miri' && 'miri' || 'dev' }}
        # fmt/sort/machete never build into target/, so the multi-GB cache
        # restore is pure overhead. Compiling legs (check/clippy/doctest/test-*)
        # keep it; a cold cache there recompiles the whole dep tree.
        read-cache: ${{ (inputs.task == 'fmt' || inputs.task == 'sort' || inputs.task == 'machete') && 'false' || 'true' }}
        # Light legs fit in the runner's ~89 GiB default headroom; skip the
        # ~20-45s reclaim. Disk-heavy legs (coverage build + testcontainers
        # images on test-*, cross-builds, miri, verify-publish) keep it.
        free-disk-space: ${{ (inputs.task == 'fmt' || inputs.task == 'sort' || inputs.task == 'clippy' || inputs.task == 'check' || inputs.task == 'check-msrv' || inputs.task == 'machete' || inputs.task == 'doctest') && 'false' || 'true' }}

    - name: Install cargo-sort
      if: inputs.task == 'sort'
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-sort

    - name: Install cargo-machete
      if: inputs.task == 'machete'
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-machete

    # cargo-http-registry has no prebuilt artifact in taiki-e/install-action,
    # so it stays a source build. verify-publish is a low-frequency task.
    - name: Install tools for specific tasks
      if: inputs.task == 'verify-publish'
      run: |
        if ! command -v cargo-http-registry >/dev/null 2>&1; then
          cargo install cargo-http-registry --locked
        fi
      shell: bash

    # DAG-based test scoping: use cargo-rail to compute affected crates from the
    # workspace dependency graph + git diff, avoiding the full test suite when only
    # a subset of crates changed.
    # Safety: cargo check/clippy run on the full workspace separately, catching all
    # compilation errors. This only scopes test BUILD and EXECUTION.
    - name: Fetch base branch for DAG analysis
      if: startsWith(inputs.task, 'test-')
      run: git fetch origin master --depth=1 2>/dev/null || true
      shell: bash

    - name: Install cargo-rail
      if: startsWith(inputs.task, 'test-')
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-rail

    - name: Compute affected crates (cargo-rail)
      if: startsWith(inputs.task, 'test-')
      run: |
        METADATA_JSON=$(cargo metadata --format-version 1 --no-deps 2>/dev/null || echo "{}")
        TOTAL_CRATES=$(echo "$METADATA_JSON" | jq '.workspace_members | length' 2>/dev/null || echo "?")
        echo "$TOTAL_CRATES" > /tmp/total-crates.txt
        # Extract packages with binary or cdylib targets — integration tests may
        # invoke binaries via assert_cmd (CARGO_BIN_EXE_<name>), and connector
        # plugins (cdylib) are loaded at runtime via dlopen by iggy-connectors.
        # Both must always be compiled alongside affected crates.
        echo "$METADATA_JSON" | jq -r '.packages[] | select(.targets[] | .kind[] | (. == "bin" or . == "cdylib")) | .name' 2>/dev/null > /tmp/bin-packages.txt || true

        PLAN_JSON=$(cargo rail plan --since origin/master -f json 2>/tmp/affected-stderr.txt || echo "")

        if [[ -n "$PLAN_JSON" ]]; then
          MODE=$(echo "$PLAN_JSON" | jq -r '.scope.mode')
          if [[ "$MODE" == "crates" ]]; then
            CRATES=$(echo "$PLAN_JSON" | jq -r '.scope.crates[]')
            CRATE_COUNT=$(echo "$CRATES" | wc -l)
            # Build nextest filter expression for cargo nextest run (affected crates only)
            echo "$CRATES" | sed 's/^/package(/; s/$/)/' | paste -sd '|' | sed 's/|/ | /g' > /tmp/nextest-filter.txt
            # Save affected-only -p flags for cargo test fallback (no nextest filter)
            echo "$CRATES" | sed 's/^/-p /' | tr '\n' ' ' > /tmp/test-packages.txt
            # Build -p flags: affected crates + packages with bin/cdylib targets.
            # Binary packages: nextest sets CARGO_BIN_EXE_<name> from compiled
            # artifacts; cdylib packages: connector plugins loaded via dlopen.
            # Both must be in the build even if not directly in the DAG scope.
            BIN_PKGS=$(cat /tmp/bin-packages.txt 2>/dev/null || echo "")
            ALL_BUILD_PKGS=$(printf '%s\n%s\n' "$CRATES" "$BIN_PKGS" | sort -u | grep -v '^$')
            echo "$ALL_BUILD_PKGS" | sed 's/^/-p /' | tr '\n' ' ' > /tmp/packages.txt
            BUILD_COUNT=$(echo "$ALL_BUILD_PKGS" | wc -l)
            echo "::notice::DAG analysis: testing ${CRATE_COUNT} crates, building ${BUILD_COUNT} (of ${TOTAL_CRATES} total, +$(( BUILD_COUNT - CRATE_COUNT )) binary pkgs)"
          else
            echo "::notice::Full workspace affected (${TOTAL_CRATES} crates)"
          fi
        else
          STDERR=$(cat /tmp/affected-stderr.txt 2>/dev/null || echo "")
          echo "::warning::Could not compute affected crates, running full test suite. ${STDERR}"
          rm -f /tmp/nextest-filter.txt /tmp/packages.txt
        fi
      shell: bash

    # Individual lint tasks for parallel execution
    - name: Cargo check
      if: inputs.task == 'check'
      run: cargo check --all --all-features
      shell: bash

    # MSRV gate: compile-check the published crates against the declared
    # workspace `rust-version`. The MSRV is read from Cargo.toml so this stays
    # in sync with the single source of truth. The `+<msrv>` override beats the
    # rust-toolchain.toml pin. check-only: downstream consumers compile our
    # libs (not our tests), so dev-deps needing newer Rust are out of scope.
    - name: Cargo check on MSRV
      if: inputs.task == 'check-msrv'
      run: |
        MSRV=$(grep -oP -m1 '^rust-version\s*=\s*"\K[^"]+' Cargo.toml)
        echo "::notice::Checking published crates against MSRV ${MSRV}"
        rustup toolchain install "$MSRV" --profile minimal --no-self-update
        cargo "+$MSRV" check --locked --all-features \
          -p iggy -p iggy_common -p iggy_binary_protocol -p iggy-cli
      shell: bash

    - name: Cargo fmt
      if: inputs.task == 'fmt'
      run: cargo fmt --all -- --check
      shell: bash

    - name: Cargo clippy
      if: inputs.task == 'clippy'
      run: cargo clippy --all-targets --all-features -- -D warnings
      shell: bash

    - name: Cargo sort
      if: inputs.task == 'sort'
      run: cargo sort --check --no-format --workspace
      shell: bash

    - name: Cargo machete
      if: inputs.task == 'machete'
      run: cargo machete --with-metadata
      shell: bash

    - name: Doc test
      if: inputs.task == 'doctest'
      run: |
        cargo test --locked --doc
        cargo doc --no-deps --all-features --quiet
      shell: bash

    - name: Verify crates publish chain to local alt-registry
      if: inputs.task == 'verify-publish'
      env:
        CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      run: ./scripts/verify-crates-publish.sh
      shell: bash

    - name: Install dependencies for Rust tests
      if: startsWith(inputs.task, 'test-') && runner.os == 'Linux'
      run: |
        sudo apt-get install --yes musl-tools gnome-keyring keyutils dbus-x11 libsecret-tools
        rm -f $HOME/.local/share/keyrings/*
      shell: bash

    - name: Install cargo-llvm-cov
      if: startsWith(inputs.task, 'test-')
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Build and test with coverage
      if: startsWith(inputs.task, 'test-')
      run: |
        # Parse partition index from task name (test-1 -> hash:1/2, test-2 -> hash:2/2)
        TASK="${{ inputs.task }}"
        PARTITION_FLAG=""
        if [[ "$TASK" =~ ^test-([0-9]+)$ ]]; then
          PARTITION_INDEX="${BASH_REMATCH[1]}"
          PARTITION_FLAG="--partition hash:${PARTITION_INDEX}/2"
          echo "::notice::Running test partition ${PARTITION_INDEX}/2"
        fi

        # Read DAG-based affected crate filter (computed in earlier step)
        NEXTEST_FILTER=""
        PACKAGE_FLAGS=""
        TEST_PACKAGE_FLAGS=""
        TOTAL_CRATES="?"
        if [[ -f /tmp/nextest-filter.txt ]]; then
          NEXTEST_FILTER=$(cat /tmp/nextest-filter.txt)
        fi
        if [[ -f /tmp/packages.txt ]]; then
          PACKAGE_FLAGS=$(cat /tmp/packages.txt)
        fi
        if [[ -f /tmp/test-packages.txt ]]; then
          TEST_PACKAGE_FLAGS=$(cat /tmp/test-packages.txt)
        fi
        if [[ -f /tmp/total-crates.txt ]]; then
          TOTAL_CRATES=$(cat /tmp/total-crates.txt)
        fi

        if [[ -n "$PACKAGE_FLAGS" ]]; then
          TEST_CRATE_COUNT=$(echo "$NEXTEST_FILTER" | grep -o 'package(' | wc -l)
          BUILD_CRATE_COUNT=$(echo "$PACKAGE_FLAGS" | grep -o '\-p ' | wc -l)
          echo "::notice::DAG-scoped: testing ${TEST_CRATE_COUNT} crates, building ${BUILD_CRATE_COUNT} (cargo check/clippy cover full workspace separately)"
        else
          echo "::notice::Full workspace build (no DAG filter available)"
        fi

        source <(cargo llvm-cov show-env --export-prefix)

        # Doris 4.0.3's start_be.sh hard-`exit 1`s unless vm.max_map_count >= 2000000.
        # This kernel param can only be set on the host (no container can raise it),
        # so we raise it here. Everything else about booting Doris — image, heap/mem
        # caps, port mappings, BE-alive wait — lives in the testcontainers fixture
        # at core/integration/tests/connectors/fixtures/doris/container.rs, so
        # `cargo test` and CI follow exactly the same path.
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo sysctl -w vm.max_map_count=2000000 || true
        fi

        bins_start=$(date +%s)
        if [[ -n "$PACKAGE_FLAGS" ]]; then
          cargo build --locked $PACKAGE_FLAGS
        else
          cargo build --locked
        fi
        bins_end=$(date +%s)
        bins_duration=$((bins_end - bins_start))
        echo "::notice::Binaries and libraries built in ${bins_duration}s ($(date -ud @${bins_duration} +'%M:%S'))"

        compile_start=$(date +%s)
        if [[ -n "$PACKAGE_FLAGS" ]]; then
          cargo test --locked --no-run $PACKAGE_FLAGS
        else
          cargo test --locked --no-run
        fi
        compile_end=$(date +%s)
        compile_duration=$((compile_end - compile_start))
        echo "::notice::Tests compiled in ${compile_duration}s ($(date -ud @${compile_duration} +'%M:%S'))"

        # Start D-Bus and unlock keyring right before test execution to avoid
        # gnome-keyring auto-locking the collection during the build phase.
        # Previously this ran before `cargo build`, leaving a 7+ minute idle
        # window that triggered org.freedesktop.Secret.Error.IsLocked ~10% of runs.
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          eval $(dbus-launch --sh-syntax)
          export DBUS_SESSION_BUS_ADDRESS
          eval $(echo -n "test" | gnome-keyring-daemon --unlock --components=secrets)
          echo -n "warmup" | secret-tool store --label="ci-warmup" ci-test warmup
        fi

        test_start=$(date +%s)
        if command -v cargo-nextest &> /dev/null; then
          if [[ -n "$NEXTEST_FILTER" ]]; then
            cargo nextest run --locked --no-fail-fast --profile ci $PARTITION_FLAG $PACKAGE_FLAGS -E "$NEXTEST_FILTER"
          else
            cargo nextest run --locked --no-fail-fast --profile ci $PARTITION_FLAG
          fi
        else
          if [[ -n "$PARTITION_FLAG" ]]; then
            echo "::error::cargo-nextest not found, falling back to cargo test without partitioning (all tests will run on every partition)"
          fi
          # Use TEST_PACKAGE_FLAGS (affected crates only), not PACKAGE_FLAGS
          # (which includes binary packages whose tests should NOT run).
          if [[ -n "$TEST_PACKAGE_FLAGS" ]]; then
            cargo test --locked --no-fail-fast $TEST_PACKAGE_FLAGS
          else
            cargo test --locked --no-fail-fast
          fi
        fi
        test_end=$(date +%s)
        test_duration=$((test_end - test_start))
        echo "::notice::Tests executed in ${test_duration}s ($(date -ud @${test_duration} +'%M:%S'))"

        build_duration=$((bins_duration + compile_duration))
        total_duration=$((build_duration + test_duration))
        echo ""
        echo "========================================="
        if [[ -n "$PACKAGE_FLAGS" ]]; then
          TEST_CRATE_COUNT=$(echo "$NEXTEST_FILTER" | grep -o 'package(' | wc -l)
          BUILD_CRATE_COUNT=$(echo "$PACKAGE_FLAGS" | grep -o '\-p ' | wc -l)
          echo "DAG scope (test):              ${TEST_CRATE_COUNT}/${TOTAL_CRATES} crates"
          echo "DAG scope (build):             ${BUILD_CRATE_COUNT}/${TOTAL_CRATES} crates"
        else
          echo "DAG scope:                     full workspace (${TOTAL_CRATES} crates)"
        fi
        echo "All targets build:             ${bins_duration}s ($(date -ud @${bins_duration} +'%M:%S'))"
        echo "Tests compile:                 ${compile_duration}s ($(date -ud @${compile_duration} +'%M:%S'))"
        echo "Tests execute:                 ${test_duration}s ($(date -ud @${test_duration} +'%M:%S'))"
        echo "-----------------------------------------"
        echo "Total build:                   ${build_duration}s ($(date -ud @${build_duration} +'%M:%S'))"
        echo "Total time:                    ${total_duration}s ($(date -ud @${total_duration} +'%M:%S'))"
        echo "========================================="

        cargo llvm-cov report --codecov --output-path codecov.json
        echo "Coverage report generated: codecov.json"
        ls -la codecov.json
      shell: bash

    - name: Backwards compatibility check
      if: inputs.task == 'compat' && (github.event_name != 'pull_request' || !contains(join(github.event.pull_request.labels.*.name, ','), 'breaking:storage'))
      run: |
        scripts/check-backwards-compat.sh \
          --master-ref master \
          --pr-ref ${{ github.sha }} \
          --port 8090 --wait-secs 180
      shell: bash

    # Miri (UB detector) on the unsafe-heavy crates that don't pull tokio /
    # compio. Pinned nightly so MIRIFLAGS behavior is stable across CI runs;
    # bump the date quarterly. Tree-borrows is the future-default aliasing
    # model and accepts the legitimate `NonNull::add` arithmetic in
    # `iobuf.rs` that stacked-borrows would reject. Strict-provenance
    # rejects int-to-pointer round trips, which we don't use.
    - name: Install nightly Rust + miri component
      if: inputs.task == 'miri'
      run: |
        rustup toolchain install nightly-2026-04-21 --component miri --profile minimal --no-self-update
        cargo +nightly-2026-04-21 miri setup
      shell: bash

    - name: Run miri
      if: inputs.task == 'miri'
      env:
        MIRIFLAGS: "-Zmiri-tree-borrows -Zmiri-strict-provenance"
      run: |
        cargo +nightly-2026-04-21 miri test --locked \
          -p iggy_binary_protocol \
          -p consensus
      shell: bash

    # aarch64 builds (run on ARM64 runners)
    - name: Build aarch64-gnu
      if: inputs.task == 'build-aarch64-gnu'
      run: cargo build --locked
      shell: bash

    - name: Install musl tools for aarch64-musl
      if: inputs.task == 'build-aarch64-musl' && runner.os == 'Linux'
      run: |
        sudo apt-get update && sudo apt-get install -y musl-tools
        rustup target add aarch64-unknown-linux-musl
      shell: bash

    - name: Build aarch64-musl
      if: inputs.task == 'build-aarch64-musl'
      # Exclude dashboard crates: charming's "ssr" feature pulls deno_core -> v8,
      # which has no prebuilt binary for aarch64-unknown-linux-musl.
      # TODO: support when upstream rusty_v8 publishes aarch64-musl binaries.
      run: >-
        cargo build --locked --workspace --target aarch64-unknown-linux-musl
        --exclude iggy-bench-dashboard-server
        --exclude bench-dashboard-frontend
      shell: bash
      env:
        PKG_CONFIG_ALLOW_CROSS: "1"
        PKG_CONFIG_ALL_STATIC: "1"

    # macOS builds
    - name: Build macOS aarch64
      if: inputs.task == 'build-macos-aarch64'
      run: cargo build --locked
      shell: bash

    # Windows builds (SDK and CLI only - iggy-server does not support Windows)
    - name: Build Windows SDK and CLI
      if: inputs.task == 'build-windows-sdk'
      run: cargo build --locked -p iggy -p iggy-cli
      shell: bash
